services:
  - type: web
    name: grantpilot-ai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      # Secrets — set these in the Render dashboard (Environment tab), not here.
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: CUSTOM_LLM_API_KEY
        sync: false
